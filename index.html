<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CommandCube</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #1a1a2e; color: #fff; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        h1 { text-align: center; margin: 20px 0; }
        .input-box { margin: 20px 0; }
        textarea { width: 100%; height: 150px; padding: 10px; background: #16213e; color: #fff; border: 1px solid #0f3460; font-family: monospace; }
        button { width: 100%; padding: 12px; background: #00d4ff; color: #000; border: none; font-weight: bold; cursor: pointer; margin: 10px 0; }
        button:hover { background: #00a8cc; }
        .output { background: #0f3460; padding: 15px; margin: 20px 0; border-radius: 5px; white-space: pre-wrap; word-wrap: break-word; min-height: 100px; max-height: 400px; overflow-y: auto; }
    </style>
</head>
<body>
    <div class="container">
        <h1>CommandCube - Execute Python</h1>
        
        <div class="input-box">
            <textarea id="code" placeholder="Enter Python code here..."></textarea>
        </div>
        
        <button onclick="runCode()">Execute</button>
        <button onclick="clearCode()">Clear</button>
        
        <div class="output" id="output">Output will appear here...</div>
    </div>

    <script>
        async function runCode() {
            const code = document.getElementById('code').value;
            const output = document.getElementById('output');
            
            if (!code.trim()) {
                output.textContent = 'Enter code first';
                return;
            }
            
            output.textContent = 'Running...';
            
            try {
                const response = await fetch('http://localhost:9000/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ script: code })
                });
                
                const data = await response.json();
                output.textContent = data.output || 'No output';
            } catch (e) {
                output.textContent = 'Error: ' + e.message;
            }
        }
        
        function clearCode() {
            document.getElementById('code').value = '';
            document.getElementById('output').textContent = 'Output will appear here...';
        }
        
        // Load saved code
        window.onload = () => {
            const saved = localStorage.getItem('commandcube-code');
            if (saved) document.getElementById('code').value = saved;
        };
        
        // Save code
        document.getElementById('code').addEventListener('change', () => {
            localStorage.setItem('commandcube-code', document.getElementById('code').value);
        });
    </script>
</body>
</html>
